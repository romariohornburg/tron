x-shared-env: &shared_envs
    DB_HOST: database
    DB_USER: tron
    DB_PASSWORD: tron
    DB_PORT: 5432
    DEBUG: "True"

x-env-portal: &shared_env_portal
  environment:
    <<: *shared_envs
    DB_NAME: portal
    DB_ENGINE: django.db.backends.postgresql

x-env-api: &shared_env_api
  environment:
    <<: *shared_envs
    DB_NAME: api
    CORS_ORIGINS: "http://localhost:3000,http://localhost:80,http://portal:3000"
    CORS_ALLOW_CREDENTIALS: "true"
    CORS_ALLOW_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
    CORS_ALLOW_HEADERS: "Content-Type,Authorization,Accept,Origin,X-Requested-With"
    SECRET_KEY: "your-super-secret-key-minimum-32-characters"
    TRON_DEFAULT_ORG_NAME: "default"
    TRON_DEFAULT_ORG_OWNER_EMAIL: "admin@example.com"
    TRON_DEFAULT_ORG_PASSWORD: "admin"
    # Encryption key for secrets (development only - generate new key for production)
    TRON_SECRETS_KEY: "NfMA_cWx0cuHAGiwl-qWYfl7u1S6bXvADFt5T9WMfUM="
    # SSO/OAuth: public API URL (redirect_uri base) and portal URL (post-login redirect)
    API_PUBLIC_URL: "http://localhost:8000"
    FRONTEND_URL: "http://localhost:3000"

services:
  database:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=tron
      - POSTGRES_PASSWORD=tron
      - POSTGRES_MULTIPLE_DATABASES=api,portal
      - PGDATA=/var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=512MB
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./db-entrypoint:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tron -d api -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  portal:
    build:
      context: ../portal
      dockerfile: Dockerfile
    image: portal
    volumes:
      - ../portal:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - api

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: api
    <<: *shared_env_api
    volumes:
      - ../api:/app
    ports:
      - 8000:8000
    depends_on:
      api-migrate:
        condition: service_completed_successfully

  api-migrate:
    image: api
    <<: *shared_env_api
    command: >
      sh -c "alembic upgrade head &&
             python scripts/load_dev_environment.py"
    volumes:
      - ../api:/app
      - ./volumes/kubeconfig:/output:ro
    depends_on:
      database:
        condition: service_healthy

  k3s-server:
    image: "rancher/k3s:${K3S_VERSION:-latest}"
    command: server --https-listen-port 5443
    tmpfs:
    - /run
    - /var/run
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    privileged: true
    environment:
    - K3S_TOKEN=something
    - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
    - K3S_KUBECONFIG_MODE=666
    volumes:
    - ./volumes/kubeconfig:/output
    - ./manifests:/var/lib/rancher/k3s/server/manifests
    ports:
    - 5443:5443
    - 8080:80    # Gateway API (Traefik HTTP)
    - 8443:443   # Gateway API (Traefik HTTPS)

  k3s-agent:
    image: "rancher/k3s:${K3S_VERSION:-latest}"
    tmpfs:
    - /run
    - /var/run
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    privileged: true
    environment:
    - K3S_URL=https://k3s-server:5443
    - K3S_TOKEN=something